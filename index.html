<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB-Refiner Community Lists - مشاركة القوائم</title>
    <style>
        /* CSS المأخوذ من تصميمك مع بعض التحسينات */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card h2 { color: #667eea; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .upload-area {
            border: 3px dashed #667eea; border-radius: 10px; padding: 30px;
            text-align: center; background: #f8f9ff; cursor: pointer; transition: all 0.3s ease;
        }
        .upload-area:hover { background: #e8ebff; }
        .file-input-label {
            display: inline-block; background: #667eea; color: white;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }
        .upload-btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
        .files-list { margin-top: 20px; max-height: 500px; overflow-y: auto; }
        .file-item {
            background: #f8f9ff; padding: 15px; border-radius: 8px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #667eea;
        }
        .btn-download { background: #667eea; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.9em; }
        .status-message { padding: 15px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .status-message.success { background: #d4edda; color: #155724; }
        .status-message.error { background: #f8d7da; color: #721c24; }
        .status-message.loading { background: #cfe2ff; color: #084298; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; max-width: 600px; width: 90%; }
        .modal-body { background: #f4f4f4; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FB-Refiner Community</h1>
        <p>شارك وحمل قوائم التصفية مع المجتمع</p>
    </header>

    <div class="main-content">
        <!-- قسم الرفع -->
        <div class="card">
            <h2><span class="card-icon">📤</span> رفع قائمة جديدة</h2>
            <div id="status" class="status-message"></div>
            
            <div class="upload-area" id="drop-zone">
                <p>اسحب الملف هنا أو اضغط للاختيار</p>
                <input type="file" id="file-input" accept=".txt">
                <label for="file-input" class="file-input-label">اختر ملف .txt</label>
                <div id="file-name-display" style="margin-top: 10px; font-weight: bold; color: #667eea;"></div>
            </div>

            <button id="upload-btn" class="upload-btn" disabled>رفع الملف للمجتمع</button>
            <small style="display: block; margin-top: 10px; color: #666;">
                * سيتم مراجعة الملف تلقائياً وإضافته للقائمة خلال دقيقة.
            </small>
        </div>

        <!-- قسم التحميل -->
        <div class="card">
            <h2><span class="card-icon">📥</span> القوائم المتوفرة</h2>
            <div id="loader" style="text-align: center; display: none;">جاري التحميل...</div>
            <div id="files-container" class="files-list">
                <!-- الملفات ستظهر هنا -->
            </div>
        </div>
    </div>
</div>

<!-- Script Logic -->
<script>
    const GITHUB_REPO = "ahmedeid5/FB-Refiner-Community-Lists";
    // ملاحظة أمنية: في المواقع الحقيقية لا نضع الـ Token هنا، لكن بما أنك طلبت حلاً بدون سيرفر،
    // يمكنك استخدام Fine-grained PAT بصلاحيات Issues فقط لهذا المستودع.
    // سأترك لك مكاناً لوضعه، وإذا كان فارغاً سيوجه المستخدم لفتح Issue يدوياً.
    const GITHUB_TOKEN = ""; 

    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const dropZone = document.getElementById('drop-zone');
    const fileNameDisplay = document.getElementById('file-name-display');
    const filesContainer = document.getElementById('files-container');
    const statusMsg = document.getElementById('status');

    let selectedFile = null;

    // 1. عرض الملفات الموجودة
    async function loadFiles() {
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/community-lists`);
            const data = await response.json();
            
            if (Array.isArray(data)) {
                filesContainer.innerHTML = '';
                data.filter(file => file.name.endsWith('.txt')).forEach(file => {
                    const cleanName = file.name.split('_').slice(1).join('_') || file.name;
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `
                        <div>
                            <div class="file-name">${cleanName}</div>
                            <div style="font-size: 0.8em; color: #888;">الحجم: ${(file.size / 1024).toFixed(1)} KB</div>
                        </div>
                        <a href="${file.download_url}" class="btn-download" download>تحميل</a>
                    `;
                    filesContainer.appendChild(item);
                });
            } else {
                filesContainer.innerHTML = '<p class="empty-message">لا توجد ملفات حالياً</p>';
            }
        } catch (error) {
            console.error("Error loading files:", error);
            filesContainer.innerHTML = '<p class="empty-message">حدث خطأ أثناء تحميل الملفات</p>';
        }
    }

    // 2. التعامل مع الملفات
    fileInput.addEventListener('change', (e) => {
        handleFileSelect(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#764ba2';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#667eea';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        handleFileSelect(e.dataTransfer.files[0]);
    });

    function handleFileSelect(file) {
        if (file && file.name.endsWith('.txt')) {
            selectedFile = file;
            fileNameDisplay.innerText = `الملف المختار: ${file.name}`;
            uploadBtn.disabled = false;
        } else {
            showStatus("يرجى اختيار ملف نصي (.txt) فقط", "error");
        }
    }

    // 3. عملية الرفع (عن طريق GitHub API لفتح Issue)
    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        showStatus("جاري تجهيز الملف...", "loading");
        uploadBtn.disabled = true;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            const issueTitle = `Community List: ${selectedFile.name}`;
            const issueBody = `اسم الملف الأصلي: ${selectedFile.name}\n\n\`\`\`\n${content}\n\`\`\``;

            if (GITHUB_TOKEN) {
                // الطريقة "المخفية" باستخدام الـ API
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            title: issueTitle,
                            body: issueBody,
                            labels: ['community-list']
                        })
                    });

                    if (response.ok) {
                        showStatus("✅ تم إرسال الملف! سيظهر في القائمة خلال دقيقة.", "success");
                        selectedFile = null;
                        fileNameDisplay.innerText = "";
                    } else {
                        throw new Error("API Error");
                    }
                } catch (error) {
                    showStatus("حدث خطأ أثناء الرفع التلقائي. يرجى المحاولة يدوياً.", "error");
                    console.error(error);
                }
            } else {
                // الطريقة الآمنة (فتح Issue يدوياً مع بيانات جاهزة)
                const url = `https://github.com/${GITHUB_REPO}/issues/new?title=${encodeURIComponent(issueTitle)}&body=${encodeURIComponent(issueBody)}&labels=community-list`;
                window.open(url, '_blank');
                showStatus("يرجى الضغط على 'Submit new issue' في الصفحة المفتوحة لإتمام الرفع.", "success");
            }
            
            uploadBtn.disabled = false;
        };
        reader.readAsText(selectedFile);
    });

    function showStatus(msg, type) {
        statusMsg.innerText = msg;
        statusMsg.className = `status-message show ${type}`;
        setTimeout(() => { statusMsg.className = 'status-message'; }, 10000);
    }

    // تشغيل عند البداية
    loadFiles();
    // تحديث القائمة كل دقيقتين
    setInterval(loadFiles, 120000);

</script>

</body>
</html>
